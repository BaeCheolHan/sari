name: MCP Soak Nightly

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      duration_sec:
        description: "Soak duration in seconds"
        required: false
        default: "1800"

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Run Gemini/Codex concurrent soak
        env:
          SARI_MCP_PROBE_REPO: ${{ github.workspace }}
          SOAK_DURATION_SEC: ${{ inputs.duration_sec || '1800' }}
          SOAK_INTERVAL_SEC: "1.0"
          SOAK_MAX_FAILURE_RATE: "0.0"
          SOAK_MAX_TIMEOUT_FAILURES: "0"
          SOAK_MIN_ATTEMPTS: "120"
          SOAK_CLIENTS: "4"
        run: |
          mkdir -p artifacts/ci
          chmod +x tools/ci/run_mcp_multi_cli_soak.sh
          tools/ci/run_mcp_multi_cli_soak.sh

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-soak-nightly-artifacts
          path: |
            artifacts/ci/mcp-multi-cli-soak.log
            artifacts/ci/mcp-multi-cli-soak-summary.json
          if-no-files-found: warn
