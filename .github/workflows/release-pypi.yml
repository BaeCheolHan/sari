name: Release PyPI

on:
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Release hard gate
        run: |
          chmod +x tools/ci/run_release_gate.sh
          tools/ci/run_release_gate.sh

      - name: Verify tag version matches pyproject
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import tomllib

          ref = pathlib.Path(".").resolve()
          pyproject = tomllib.loads((ref / "pyproject.toml").read_text(encoding="utf-8"))
          version = str(pyproject["project"]["version"])
          tag = "${{ github.ref_name }}"
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag/version mismatch: tag={tag}, expected={expected}")
          print(f"[release] tag/version check OK: {tag}")
          PY

      - name: Build and twine check
        run: tools/ci/release_pypi.sh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

      - name: Upload release gate summary
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-summary
          path: artifacts/ci/release-gate-summary.json

  publish-pypi:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish_to_testpypi != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_testpypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
