{
  "capture_to_kind": {
    "symbol.module": "module",
    "symbol.class": "class",
    "symbol.interface": "interface",
    "symbol.enum": "enum",
    "symbol.method": "method",
    "symbol.field": "field"
  },
  "kind_bucket_map": {
    "module": "module",
    "class": "class",
    "trait": "interface",
    "interface": "interface",
    "enum": "enum",
    "object": "class",
    "method": "method",
    "function": "method",
    "field": "field",
    "variable": "field",
    "2": "module",
    "4": "module",
    "5": "class",
    "6": "method",
    "7": "field",
    "8": "field",
    "10": "enum",
    "11": "interface",
    "12": "function",
    "13": "field"
  },
  "missing_pattern_rules": [
    {
      "when_kind_bucket_in": ["field"],
      "result": "missing_field"
    },
    {
      "when_kind_bucket_in": ["method", "function"],
      "result": "missing_method"
    },
    {
      "when_kind_bucket_in": ["class", "interface", "enum"],
      "result": "missing_type"
    }
  ],
  "name_extract_rules": [],
  "line_match_overrides": {
    "name_kind_fallback_buckets": ["module", "class", "interface", "enum", "method", "field"],
    "name_kind_fallback_max_line_gap": 8
  }
}
